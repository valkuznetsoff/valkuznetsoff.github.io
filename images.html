<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
	<link rel="stylesheet" href="styles.css">
    </head>

    <body>
	<nav class="top-menu">
	  <ul class="menu-list">
	    <li><a href="index.html">Index</a></li>
	  </ul>
	</nav>

	<div style="text-align: center;">
	    <img src="google.jpg" alt="Google search">
	</div>

	<div class="form-wrapper">
	    <form class="my-form" action="https://www.google.com/search">
		<div class="search-container">
		    <input type="text" class="search-input" placeholder="Шукати зображення" name="q">
		    <input type="hidden" name="tbm" value="isch">
		</div>
		<br/>

		<div style="text-align: center;">
			<input type="submit" value="Пошук у Google" class="fancy-submit">
			<button type="submit" value="I" name="btnI" class="fancy-submit"> Мені пощастить! </button>
		</div>
	    </form>
	</div>
    </body>
</html>
